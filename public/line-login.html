<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE Login · Dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
    }

    .badge {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #1a202c; margin-bottom: 0.4rem; }
    p.sub { font-size: 0.875rem; color: #718096; margin-bottom: 2rem; }

    .btn-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: #06C755;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-line:hover { background: #05b34b; }

    .panel {
      margin-top: 1.5rem;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.875rem;
      display: none;
    }
    .panel.error   { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
    .panel.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .panel.visible { display: block; }
    .panel h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }

    .profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .profile img {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #9ae6b4;
    }
    .profile .name { font-weight: 600; font-size: 1rem; color: #1a202c; }

    .token-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #276749;
      margin-bottom: 0.25rem;
    }
    .token-block {
      background: #e6ffed;
      border-radius: 6px;
      padding: 0.75rem;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.72rem;
      word-break: break-all;
      color: #22543d;
      margin-bottom: 0.4rem;
    }
    .copy-btn {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #9ae6b4;
      background: #fff;
      color: #276749;
      cursor: pointer;
    }
    .copy-btn:hover { background: #c6f6d5; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 1rem 0; }
  </style>
</head>
<body>
<div class="card">
  <span class="badge">Dev / Testing Only</span>
  <h1>LINE Login</h1>
  <p class="sub">Sign in with your LINE account to obtain a JWT for API testing.</p>

  <a class="btn-line" href="/auth/line/login">
    <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4C12.954 4 4 11.82 4 21.5c0 8.02 6.577 14.77 15.594 16.85.607.13.717.5.537 1.018l-.867 3.203c-.25.93.97 1.65 1.75.91C24.514 40.647 43 28.83 43 21.5 43 11.82 35.046 4 24 4z" fill="#fff"/>
    </svg>
    Continue with LINE
  </a>

  <div class="panel error" id="errorPanel">
    <h3>&#9888; Authentication Error</h3>
    <span id="errorMsg"></span>
  </div>

  <div class="panel success" id="successPanel">
    <h3>&#10003; Authenticated</h3>
    <div class="profile" id="profileRow"></div>

    <div class="token-label">Access Token</div>
    <div class="token-block" id="accessToken"></div>
    <button class="copy-btn" onclick="copyToken('accessToken')">Copy</button>

    <hr class="divider" />

    <div class="token-label">Refresh Token</div>
    <div class="token-block" id="refreshToken"></div>
    <button class="copy-btn" onclick="copyToken('refreshToken')">Copy</button>
  </div>
</div>

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");
    const displayName = params.get("display_name");
    const pictureUrl = params.get("picture_url");

    if (error) {
      document.getElementById("errorMsg").textContent = decodeURIComponent(error);
      document.getElementById("errorPanel").classList.add("visible");
      return;
    }

    if (accessToken && refreshToken) {
      document.getElementById("accessToken").textContent = accessToken;
      document.getElementById("refreshToken").textContent = refreshToken;

      const profileRow = document.getElementById("profileRow");
      if (pictureUrl) {
        const img = document.createElement("img");
        img.src = pictureUrl;
        img.alt = displayName ?? "LINE user";
        profileRow.appendChild(img);
      }
      const nameEl = document.createElement("span");
      nameEl.className = "name";
      nameEl.textContent = displayName ?? "LINE User";
      profileRow.appendChild(nameEl);

      document.getElementById("successPanel").classList.add("visible");
      window.history.replaceState({}, "", window.location.pathname);
    }
  })();

  function copyToken(id) {
    const text = document.getElementById(id).textContent ?? "";
    navigator.clipboard.writeText(text).catch(() => {
      prompt("Copy the token:", text);
    });
  }
</script>
</body>
</html>
